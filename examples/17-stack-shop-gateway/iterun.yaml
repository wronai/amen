INTENT:
  name: shop-stack
  goal: E-commerce stack with API gateway, users microservice, and catalog microservice

STACK:
  network: shop-net
  services:
    api-gateway:
      language: python
      framework: fastapi
      base_image: python:3.12-slim
      port: 8000
      host_port: 18080
      depends_on: [users-service, catalog-service]
      actions:
        - api.expose GET /ping
        - api.expose GET /health
        - api.expose GET /users
        - api.expose GET /products
    users-service:
      language: python
      framework: fastapi
      base_image: python:3.12-slim
      port: 8000
      actions:
        - api.expose GET /health
        - api.expose GET /users
    catalog-service:
      language: node
      framework: express
      base_image: node:20-slim
      port: 8000
      actions:
        - api.expose GET /health
        - api.expose GET /products

EXECUTION:
  mode: transactional
